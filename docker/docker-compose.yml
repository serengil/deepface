services:
  postgres:
    image: postgres:15
    container_name: deepface-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: deepface
      POSTGRES_USER: deepface_user
      POSTGRES_PASSWORD: deepface_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deepface_user -d deepface"]
      interval: 5s
      timeout: 5s
      retries: 10

  deepface:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: deepface
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ../deepface/api/.env
    environment:
      DEEPFACE_CONNECTION_DETAILS: postgresql://deepface_user:deepface_pass@postgres:5432/deepface
    ports:
      - "5005:5000"
    volumes:
      - ${HOME}/.deepface/weights:/root/.deepface/weights

volumes:
  postgres_data:
